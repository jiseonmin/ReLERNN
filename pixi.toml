[project]
name = "ReLERNN"
version = "0.2.0"
description = "Recombination Landscape Estimation using Recurrent Neural Networks"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = ">=3.10,<3.13"
numpy = ">=1.24"
scikit-learn = ">=1.0"
matplotlib = ">=3.5"
scikit-allel = ">=1.3"
msprime = ">=1.0"
h5py = ">=3.0"
keras = ">=3.0"

[pypi-dependencies]
ReLERNN = { path = ".", editable = true }

[feature.cuda]
system-requirements = { cuda = "12" }

[feature.cuda.dependencies]
tensorflow = { version = ">=2.18", build = "cuda*" }
cuda-version = "12.*"
cuda-nvcc = "*"
cuda-compat = "*"

[feature.cuda.activation.env]
XLA_FLAGS = "--xla_gpu_cuda_data_dir=$CONDA_PREFIX"

[feature.cpu.dependencies]
tensorflow = { version = ">=2.16", build = "cpu*" }

[environments]
default = ["cuda"]
cpu = ["cpu"]

[tasks]
example = { cmd = "bash example_pipeline.sh", cwd = "examples" }
example-pool = { cmd = "bash example_pipeline_pool.sh", cwd = "examples" }
